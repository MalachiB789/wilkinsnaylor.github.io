<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Blog | Naylor Homes</title>
  <meta
    name="description"
    content="News and practical updates from Naylor Homes on renting, standards, and tenant guidance."
  />

  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages.css" />
</head>

<body>
  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="kicker"><span class="hero-badge">Blog</span></p>
        <h1>Latest updates</h1>
        <p class="muted">
          Practical posts on renting, maintenance standards, and what tenants can expect from us.
        </p>
      </div>
    </section>
    <div class="section-divider" aria-hidden="true"></div>

    <section class="section">
      <div class="container" data-blog-featured>
      </div>

      <div class="container section-head" style="margin-top: 64px;">
        <div>
          <h2>More articles</h2>
        </div>
      </div>

      <div class="container blog-grid" data-blog-grid>
      </div>
    </section>
    <div class="section-divider" aria-hidden="true"></div>

    <section class="cta">
      <div class="container cta-inner">
        <div class="cta-copy">
          <h2>Have a question about a post?</h2>
          <p class="muted">Contact us and we will be happy to help.</p>
        </div>
        <div class="cta-actions">
          <a class="btn" href="./contact.html">Contact Us</a>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="../js/posts.js" defer></script>
  <script src="../js/blog.js" defer></script>
  <script src="../js/main.js" defer></script>
</body>
</html>
